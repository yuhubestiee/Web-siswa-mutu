<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kantin Mutu - Smart Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --gold: #FFD700; --dark-bg: #121212; --card-bg: #1E1E1E; --text-main: #FFFFFF; --text-dim: #A0A0A0; --special: #f39c12; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--dark-bg); color: var(--text-main); overflow-x: hidden; width: 100vw; }
        
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
        .loader-ring { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }

        .app-container { width: 100%; min-height: 100vh; padding-bottom: 120px; }
        .header { padding: 40px 15px 10px; text-align: center; }
        .brand { font-size: 24px; font-weight: 800; color: var(--gold); letter-spacing: 1px; }
        .sub-brand { font-size: 10px; color: var(--text-dim); margin-top: 5px; letter-spacing: 1px; }

        .category-bar { display: flex; gap: 10px; overflow-x: auto; padding: 20px 15px; scrollbar-width: none; }
        .cat-item { flex: 0 0 auto; padding: 10px 20px; background: #222; border-radius: 12px; border: 1px solid #333; font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .cat-item.active { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); color: var(--gold); }
        
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #2a2a2a; }
        .card-img { width: 100%; height: 120px; object-fit: cover; background: #222; }
        .card-body { padding: 12px; }
        .title { font-size: 12px; font-weight: 600; height: 35px; overflow: hidden; }
        .price { font-size: 14px; font-weight: 800; color: var(--gold); margin: 8px 0; }
        .btn-add { width: 100%; padding: 10px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 11px; }

        /* STYLE SPECIAL ORDER - WEB PELANGGAN */
        #special-order-container { padding: 0 12px; margin-top: 20px; }
        .special-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px dashed var(--gold); text-align: center; }
        .chef-img { width: 110px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.2)); }
        .special-input { width: 100%; padding: 12px; background: #252525; border: 1px solid #333; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; font-size: 13px; }
        .btn-special { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; color: #000; }
        .live-comment-box { margin-top: 20px; text-align: left; border-top: 1px solid #333; padding-top: 15px; }
        .comment-item { background: #252525; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--gold); font-size: 12px; }

        .qty-control { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; border-radius: 10px; border: 1px solid var(--gold); }
        .btn-qty { width: 35px; height: 35px; border: none; background: transparent; color: var(--gold); font-size: 18px; font-weight: bold; }

        .dock-wrapper { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .dock { width: 90%; padding: 15px 20px; background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; transform: translateY(200%); transition: 0.5s; pointer-events: auto; }
        .dock.active { transform: translateY(0); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .overlay.active { display: flex; }
        .checkout-card { background: var(--card-bg); border-radius: 20px; padding: 25px; width: 100%; max-width: 400px; border: 1px solid #333; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader-ring"></div></div>

    <div class="app-container">
        <div class="header">
            <div class="brand">KANTIN MUTU</div>
            <div class="sub-brand">SMK MUHAMMADIYAH 1 PRAMBON</div>
            <div class="category-bar" id="cat-list"></div>
        </div>

        <div class="menu-grid" id="menu-display"></div>

        <div id="special-order-container">
            <div class="special-card">
                <p style="color:var(--gold); font-weight:800; font-size:14px; margin-bottom:10px;">SPECIAL ORDER</p>
                <img src="https://cdn-icons-png.flaticon.com/512/3461/3461935.png" class="chef-img" alt="Chef">
                <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 15px;">Punya ide menu? Kasih tau Chef di sini!</p>
                
                <input type="text" id="special-name" class="special-input" placeholder="Nama (Opsional)">
                <textarea id="special-comment" class="special-input" style="height:80px; resize:none;" placeholder="Rekomendasi menu apa nih bro?"></textarea>
                
                <button class="btn-special" id="btn-kirim-ide" onclick="sendComment()">KIRIM IDE MENU 🚀</button>

                <div class="live-comment-box" id="live-comments">
                    <p style="font-size:10px; color:var(--gold); margin-bottom:10px;">IDE DARI PELANGGAN LAIN:</p>
                    <div id="comment-list-container"></div>
                </div>
            </div>
        </div>

        <div class="dock-wrapper">
            <div class="dock" id="dock">
                <div><p style="font-size:10px; color:var(--text-dim);">TOTAL</p><p style="font-size:18px; font-weight:800; color:var(--gold);" id="price-total">Rp 0</p></div>
                <button onclick="openCheckout()" style="padding:12px 25px; background:var(--gold); border:none; border-radius:12px; font-weight:800;">GAS!</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="checkout-overlay">
        <div class="checkout-card">
            <h3 style="color:var(--gold); margin-bottom:15px;">DATA PESANAN</h3>
            <input type="text" id="buyer-name" class="special-input" style="padding:15px;" placeholder="Nama Pelanggan / Meja">
            <div id="order-summary" style="margin-bottom:15px; font-size:12px;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom:20px;">
                <div class="pay-option" style="background:#252525; border:1px solid #333; padding:12px; border-radius:10px; text-align:center; color:var(--text-dim); cursor:pointer;" onclick="selectPay('QRIS', this)">QRIS</div>
                <div class="pay-option" style="background:#252525; border:1px solid #333; padding:12px; border-radius:10px; text-align:center; color:var(--text-dim); cursor:pointer;" onclick="selectPay('TUNAI', this)">TUNAI</div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px;">
                <button onclick="closeCheckout()" style="background:#333; color:#fff; border:none; border-radius:12px; padding:12px;">BATAL</button>
                <button onclick="prosesPesanan()" style="background:var(--gold); font-weight:800; border:none; border-radius:12px;">ORDER</button>
            </div>
        </div>
    </div>

    <script>
        // PAKAI URL APPS SCRIPT YANG BARU TON
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3nMbmmVeZ4NLiE-ZCaCzKqT26_TBVhnL8ahKOHVxquCXG122zqBto89Nt9HirMXCcWw/exec";
        
        let allData = [], cart = {}, currentCat = "Semua", selectedPay = "", currentOrderData = {};

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const raw = await res.json();
                allData = raw.map((item, i) => ({ id: `item-${i}`, name: item.name, price: parseInt(item.price), cat: item.category, img: item.imgurl || `https://via.placeholder.com/150?text=${item.name}` }));
                renderCategories(); renderMenu("Semua");
                document.getElementById('loading-screen').classList.add('fade-out');
            } catch (e) { alert("Gagal konek cloud!"); }
        }

        function renderCategories() {
            const cats = ['Semua', ...new Set(allData.map(d => d.cat)), 'SPECIAL ORDER'];
            document.getElementById('cat-list').innerHTML = cats.map(c => `<div class="cat-item ${c===currentCat?'active':''}" onclick="filterCat('${c}')">${c}</div>`).join('');
        }

        function filterCat(c) { 
            currentCat = c; 
            renderCategories(); 
            
            // Logika Tampilan: Jika klik Special Order, sembunyikan menu grid
            if(c === 'SPECIAL ORDER') {
                document.getElementById('menu-display').style.display = 'none';
                document.getElementById('special-order-container').scrollIntoView({behavior: "smooth"});
            } else {
                document.getElementById('menu-display').style.display = 'grid';
                renderMenu(c);
            }
        }

        function renderMenu(cat) {
            const filtered = cat === 'Semua' ? allData : allData.filter(d => d.cat === cat);
            document.getElementById('menu-display').innerHTML = filtered.map(d => {
                const q = cart[d.id] ? cart[d.id].qty : 0;
                return `<div class="card"><img src="${d.img}" class="card-img"><div class="card-body"><p class="title">${d.name}</p><p class="price">Rp ${d.price.toLocaleString('id-ID')}</p><div id="ctrl-${d.id}">${q>0?renderQty(d.id,q):`<button class="btn-add" onclick="updateCart('${d.id}',1)">TAMBAH</button>`}</div></div></div>`;
            }).join('');
        }

        function renderQty(id, qty) { return `<div class="qty-control"><button class="btn-qty" onclick="updateCart('${id}',-1)">-</button><span class="qty-num">${qty}</span><button class="btn-qty" onclick="updateCart('${id}',1)">+</button></div>`; }

        function updateCart(id, change) {
            const item = allData.find(d => d.id === id);
            if (!cart[id]) cart[id] = { name: item.name, price: item.price, qty: 0 };
            cart[id].qty += change; if (cart[id].qty <= 0) delete cart[id];
            renderMenu(currentCat); updateDock();
        }

        function updateDock() {
            let total = 0; for(let k in cart) total += cart[k].qty * cart[k].price;
            document.getElementById('price-total').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            total > 0 ? document.getElementById('dock').classList.add('active') : document.getElementById('dock').classList.remove('active');
        }

        // FUNGSI KIRIM KOMENTAR KE SPREADSHEET
        async function sendComment() {
            const name = document.getElementById("special-name").value.trim();
            const comment = document.getElementById("special-comment").value.trim();
            const btn = document.getElementById("btn-kirim-ide");

            if (!comment) return alert("Isi ide menu lu dulu bro!");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            const payload = {
                action: "saveComment",
                nama: name || "Anonim",
                komentar: comment
            };

            try {
                // Gunakan POST ke Apps Script
                await fetch(SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(payload)
                });

                // Render Live di Web
                const container = document.getElementById("comment-list-container");
                const div = document.createElement("div");
                div.className = "comment-item";
                div.innerHTML = `<b>${payload.nama}</b>: ${comment}`;
                container.prepend(div);

                document.getElementById("special-comment").value = "";
                alert("Ide lu mantap! Udah masuk ke meja Chef.");
            } catch (e) {
                alert("Error kirim komentar.");
            } finally {
                btn.disabled = false;
                btn.innerText = "KIRIM IDE MENU 🚀";
            }
        }

        // SISA FUNGSI PESANAN (PROSES PESANAN, DLL) TETAP SAMA SEPERTI KODE LAMA LU
        // ... (Tambahkan kembali fungsi prosesPesanan, openCheckout, dsb dari file asli lu)

        init();
    </script>
</body>
</html>
