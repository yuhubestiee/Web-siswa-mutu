<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kantin Mutu - Exclusive Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; --dark-bg: #121212; --card-bg: #1E1E1E; 
            --text-main: #FFFFFF; --text-dim: #A0A0A0; 
        }
        
        /* Reset Total biar Gak Melebar */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            width: 100%;
            overflow-x: hidden; /* Kunci biar gak bisa geser kanan kiri */
        }

        .app-container { 
            width: 100%;
            max-width: 100%;
            min-height: 100vh; 
            background-color: var(--card-bg); 
            position: relative; 
            padding-bottom: 150px;
        }

        /* --- LOADING SCREEN --- */
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: var(--dark-bg); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; transition: 0.8s ease; 
        }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }

        /* --- HEADER --- */
        .header { 
            padding: 25px 15px 15px; 
            background: var(--card-bg); 
            text-align: center;
        }
        .brand { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: 1px; line-height: 1; }
        .sub-brand { font-size: 10px; color: var(--text-dim); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .category-bar { 
            display: flex; overflow-x: auto; gap: 8px; 
            padding: 15px 15px 10px; scrollbar-width: none; 
        }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-item { flex: 0 0 auto; padding: 8px 16px; background: #252525; border-radius: 10px; border: 1px solid transparent; }
        .cat-item.active { background: rgba(255, 215, 0, 0.1); border-color: var(--gold); }
        .cat-name { font-size: 10px; font-weight: 600; color: var(--text-dim); }
        .cat-item.active .cat-name { color: var(--gold); }

        /* --- MENU GRID --- */
        .menu-grid { 
            padding: 10px 15px; 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 100%;
        }
        
        .card { 
            background: #252525; border-radius: 15px; 
            overflow: hidden; display: flex; flex-direction: column;
        }
        .card-img { width: 100%; height: 100px; object-fit: cover; }
        .card-body { padding: 10px; gap: 2px; }
        .title { font-size: 12px; font-weight: 600; height: 32px; overflow: hidden; }
        .price { font-size: 14px; font-weight: 800; color: var(--gold); margin-bottom: 8px; }

        .btn-add { width: 100%; padding: 8px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 800; font-size: 10px; }
        .qty-control { display: flex; justify-content: space-between; align-items: center; background: #333; border-radius: 8px; border: 1px solid var(--gold); }
        .btn-qty { width: 30px; height: 30px; border: none; background: transparent; color: var(--gold); font-size: 18px; }

        /* --- DOCK --- */
        .dock-wrapper { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .dock { 
            width: 90%; padding: 15px 20px; background: rgba(30, 30, 30, 0.95); 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            transform: translateY(200%); transition: 0.5s; pointer-events: auto; 
        }
        .dock.active { transform: translateY(0); }
        .btn-pay { padding: 10px 20px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="loading-screen">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJidW1idW1idW1idW1idW1idW1idW1idW1idW1idW1idW1idW0mZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/3o7TKMGpxx8yGvRjW0/giphy.gif" style="width:120px;">
            <p style="margin-top:10px; color:var(--gold); font-size:10px; font-weight:600; letter-spacing:2px;">KANTIN MUTU</p>
        </div>

        <div class="header">
            <div class="brand">KANTIN MUTU</div>
            <div class="sub-brand">SMK MUHAMMADIYAH 1 PRAMBON</div>
        </div>

        <div class="category-bar" id="cat-list"></div>
        <div class="menu-grid" id="menu-display"></div>

        <div class="dock-wrapper">
            <div class="dock" id="dock">
                <div>
                    <p style="font-size:9px; color:var(--text-dim);">Total <span id="qty-total">0</span> Item</p>
                    <p style="font-size:18px; font-weight:800; color:var(--gold);" id="price-total">Rp 0</p>
                </div>
                <button class="btn-pay" onclick="alert('Checkout?')">PESAN</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwe7AhpgKehwmReVQZpXSoq5aNChEwR4dNLyXkjAU9FfRnBO0zJCCSPa8zlI1XzVA/exec";
        let allData = [];
        let cart = {};

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const raw = await res.json();
                allData = raw.map((item, i) => ({
                    id: `item-${i}`,
                    name: item.name,
                    price: parseInt(item.price),
                    cat: item.category,
                    img: (item.imgurl && item.imgurl.trim() !== "") ? item.imgurl : `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300` 
                }));
                renderCategories();
                renderMenu('Semua');
                setTimeout(() => document.getElementById('loading-screen').classList.add('fade-out'), 1500);
            } catch (e) { console.error(e); }
        }

        function renderCategories() {
            const cats = ['Semua', ...new Set(allData.map(d => d.cat))];
            document.getElementById('cat-list').innerHTML = cats.map(c => `
                <div class="cat-item ${c==='Semua'?'active':''}" onclick="filterCat('${c}', this)">
                    <span class="cat-name">${c}</span>
                </div>`).join('');
        }

        function renderMenu(cat) {
            const filtered = cat === 'Semua' ? allData : allData.filter(d => d.cat === cat);
            document.getElementById('menu-display').innerHTML = filtered.map(d => {
                const q = cart[d.id] ? cart[d.id].qty : 0;
                return `
                <div class="card">
                    <img src="${d.img}" class="card-img" onerror="this.src='https://via.placeholder.com/200x100?text=Food'">
                    <div class="card-body">
                        <p class="title">${d.name}</p>
                        <p class="price">Rp ${d.price.toLocaleString('id-ID')}</p>
                        <div id="ctrl-${d.id}">
                            ${q > 0 ? renderQtyCtrl(d.id, q) : `<button class="btn-add" onclick="updateCart('${d.id}', 1)">TAMBAH</button>`}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderQtyCtrl(id, qty) {
            return `<div class="qty-control"><button class="btn-qty" onclick="updateCart('${id}', -1)">-</button><span class="qty-num">${qty}</span><button class="btn-qty" onclick="updateCart('${id}', 1)">+</button></div>`;
        }

        function updateCart(id, change) {
            const item = allData.find(d => d.id === id);
            if (!cart[id]) cart[id] = { name: item.name, price: item.price, qty: 0 };
            cart[id].qty += change;
            if (cart[id].qty <= 0) delete cart[id];
            const currentQty = cart[id] ? cart[id].qty : 0;
            document.getElementById(`ctrl-${id}`).innerHTML = currentQty > 0 ? renderQtyCtrl(id, currentQty) : `<button class="btn-add" onclick="updateCart('${id}', 1)">TAMBAH</button>`;
            updateDock();
        }

        function updateDock() {
            let tQ = 0, tP = 0;
            for(let k in cart) { tQ += cart[k].qty; tP += cart[k].qty * cart[k].price; }
            document.getElementById('qty-total').innerText = tQ;
            document.getElementById('price-total').innerText = `Rp ${tP.toLocaleString('id-ID')}`;
            tQ > 0 ? document.getElementById('dock').classList.add('active') : document.getElementById('dock').classList.remove('active');
        }

        function filterCat(c, el) {
            document.querySelectorAll('.cat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            renderMenu(c);
        }

        init();
    </script>
</body>
</html>
