<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kantin Mutu - Digital Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #FFD700; --dark-bg: #121212; --card-bg: #1E1E1E; 
            --text-main: #FFFFFF; --text-dim: #A0A0A0; 
        }

        /* RESET & BASE */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--dark-bg); color: var(--text-main); overflow-x: hidden; width: 100vw; }

        /* LOADING SCREEN */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.3s; }
        #loading-screen.fade-out { opacity: 0; visibility: hidden; }
        .loader-ring { width: 35px; height: 35px; border: 3px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }

        .app-container { width: 100%; min-height: 100vh; padding-bottom: 120px; }
        
        /* HEADER */
        .header { padding: 35px 15px 10px; text-align: center; }
        .brand { font-size: 22px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; }
        .sub-brand { font-size: 10px; color: var(--text-dim); margin-top: 4px; opacity: 0.7; letter-spacing: 0.5px; }

        /* CATEGORY SLIDER */
        .category-bar { display: flex; gap: 8px; overflow-x: auto; padding: 20px 15px; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-item { flex: 0 0 auto; padding: 10px 18px; background: #222; border-radius: 10px; border: 1px solid #333; transition: 0.2s; }
        .cat-item.active { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); }
        .cat-name { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
        .cat-item.active .cat-name { color: var(--gold); }

        /* GRID MENU (ZOOM VIBE) */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 12px; }
        .card { background: var(--card-bg); border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #2a2a2a; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card-img { width: 100%; height: 130px; object-fit: cover; background: #222; border-bottom: 1px solid #2a2a2a; }
        .card-body { padding: 12px; }
        .title { font-size: 13px; font-weight: 600; color: #fff; height: 34px; overflow: hidden; margin-bottom: 5px; line-height: 1.3; }
        .price { font-size: 15px; font-weight: 800; color: var(--gold); margin-bottom: 12px; }
        .btn-add { width: 100%; padding: 12px; background: var(--gold); color: #000; border: none; border-radius: 9px; font-weight: 800; font-size: 10px; text-transform: uppercase; }

        /* QTY CONTROLLER */
        .qty-control { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; border-radius: 9px; border: 1px solid var(--gold); }
        .btn-qty { width: 35px; height: 35px; border: none; background: transparent; color: var(--gold); font-size: 20px; font-weight: bold; cursor: pointer; }
        .qty-num { font-weight: 800; color: #fff; font-size: 14px; }

        /* DOCK BAR */
        .dock-wrapper { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; pointer-events: none; }
        .dock { width: 90%; padding: 18px 22px; background: rgba(25, 25, 25, 0.96); backdrop-filter: blur(12px); border: 1px solid rgba(255,215,0,0.3); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; transform: translateY(180%); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .dock.active { transform: translateY(0); }
        .btn-pay { padding: 12px 25px; background: var(--gold); color: #000; border: none; border-radius: 10px; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }

        /* CHECKOUT MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); backdrop-filter: blur(10px); z-index: 2000; display: none; padding: 20px; overflow-y: auto; }
        .overlay.active { display: flex; align-items: center; justify-content: center; }
        .checkout-card { background: var(--card-bg); border-radius: 24px; padding: 25px; border: 1px solid #333; width: 100%; max-width: 400px; }
        .form-input { width: 100%; padding: 15px; background: #252525; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 20px; font-size: 14px; outline: none; }
        .form-input:focus { border-color: var(--gold); }
        .payment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .pay-option { background: #252525; border: 1px solid #333; padding: 15px; border-radius: 12px; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-dim); transition: 0.2s; }
        .pay-option.selected { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); transform: scale(1.02); }
        
        /* QR MODAL */
        #qr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #qr-image { width: 90%; max-width: 320px; background: #fff; padding: 15px; border-radius: 15px; margin: 25px 0; box-shadow: 0 0 30px rgba(255,215,0,0.2); }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="loading-screen"><div class="loader-ring"></div><p style="margin-top:15px; font-size:10px; color:var(--gold); letter-spacing:2px;">MEMUAT MENU...</p></div>
        
        <div class="header">
            <div class="brand">KANTIN MUTU</div>
            <div class="sub-brand">SMK MUHAMMADIYAH 1 PRAMBON</div>
            <div class="category-bar" id="cat-list"></div>
        </div>

        <div class="menu-grid" id="menu-display"></div>

        <div class="dock-wrapper">
            <div class="dock" id="dock">
                <div>
                    <p style="font-size:9px; color:var(--text-dim); text-transform:uppercase; margin-bottom:2px;">Total Bayar</p>
                    <p style="font-size:18px; font-weight:800; color:var(--gold);" id="price-total">Rp 0</p>
                </div>
                <button class="btn-pay" onclick="openCheckout()">BAYAR</button>
            </div>
        </div>
    </div>

    <div class="overlay" id="checkout-overlay">
        <div class="checkout-card">
            <h3 style="color:var(--gold); margin-bottom:20px; text-align:center; letter-spacing:1px;">KONFIRMASI</h3>
            <input type="text" id="buyer-name" class="form-input" placeholder="Ketik Nama Lu...">
            
            <div id="order-summary" style="margin-bottom:20px; font-size:13px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid #2a2a2a;"></div>
            
            <p style="font-size:10px; color:var(--text-dim); margin-bottom:10px; text-transform:uppercase;">Pilih Metode:</p>
            <div class="payment-grid">
                <div class="pay-option" onclick="selectPay('QRIS', this)">QRIS (OTOMATIS)</div>
                <div class="pay-option" onclick="selectPay('TUNAI', this)">TUNAI (KASIR)</div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 2fr; gap:12px;">
                <button onclick="closeCheckout()" style="background:#333; color:#fff; border:none; border-radius:12px; padding:15px; font-weight:600;">BATAL</button>
                <button onclick="prosesPesanan()" style="background:var(--gold); color:#000; border:none; border-radius:12px; padding:15px; font-weight:800; text-transform:uppercase;">GAS PESAN!</button>
            </div>
        </div>
    </div>

    <div id="qr-modal">
        <h2 style="color:var(--gold); letter-spacing:1px;">SCAN QRIS</h2>
        <p id="qr-total-label" style="color:#fff; margin-top:10px; font-weight:800; font-size:20px;"></p>
        <img id="qr-image" src="" alt="QR Code">
        <p style="color:var(--text-dim); font-size:12px; line-height:1.6; padding: 0 20px;">Silakan screenshot dan bayar via e-wallet.<br>Pesanan sudah terdaftar di bot Telegram kami.</p>
        <button onclick="location.reload()" style="margin-top:40px; background:var(--gold); border:none; padding:18px 45px; border-radius:12px; font-weight:800; text-transform:uppercase; box-shadow: 0 5px 15px rgba(255,215,0,0.3);">OKE, SELESAI</button>
    </div>

    <script>
        // --- KONFIGURASI SISTEM ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwe7AhpgKehwmReVQZpXSoq5aNChEwR4dNLyXkjAU9FfRnBO0zJCCSPa8zlI1XzVA/exec";
        const TELE_TOKEN = "7982712334:AAFS2RvvZ_p3YACAoFGxwkq_vY9Ov9zKd7E";
        const TELE_CHAT_ID = "6381109580"; 
        const QRIS_DATA = "00020101021126670014ID.CO.QRIS.WWW0215ID10200542345670303UME51440014ID.CO.QRIS.WWW0215ID10200542345670303UME5204599953033605802ID5911KANTIN MUTU6007PRAMBON6105644716304ABCD";

        let allData = [], cart = {}, currentCat = "Semua", selectedPayMethod = "";

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL);
                const raw = await res.json();
                allData = raw.map((item, i) => ({ 
                    id: `item-${i}`, 
                    name: item.name, 
                    price: parseInt(item.price), 
                    cat: item.category, 
                    img: item.imgurl || `https://via.placeholder.com/400x300/1e1e1e/ffd700?text=${item.name}` 
                }));
                renderCategories(); 
                renderMenu("Semua");
                document.getElementById('loading-screen').classList.add('fade-out');
            } catch (e) { console.error("Error Load Data:", e); }
        }

        function renderCategories() {
            const cats = ['Semua', ...new Set(allData.map(d => d.cat))];
            document.getElementById('cat-list').innerHTML = cats.map(c => `
                <div class="cat-item ${c === currentCat ? 'active' : ''}" onclick="filterCat('${c}')">
                    <span class="cat-name">${c}</span>
                </div>`).join('');
        }

        function filterCat(c) { currentCat = c; renderCategories(); renderMenu(c); }

        function renderMenu(cat) {
            const filtered = cat === 'Semua' ? allData : allData.filter(d => d.cat === cat);
            document.getElementById('menu-display').innerHTML = filtered.map(d => {
                const q = cart[d.id] ? cart[d.id].qty : 0;
                return `
                <div class="card">
                    <img src="${d.img}" class="card-img" onerror="this.src='https://via.placeholder.com/400x300/1e1e1e/ffd700?text=Mutu'">
                    <div class="card-body">
                        <p class="title">${d.name}</p>
                        <p class="price">Rp ${d.price.toLocaleString('id-ID')}</p>
                        <div id="ctrl-${d.id}">
                            ${q > 0 ? renderQtyCtrl(d.id, q) : `<button class="btn-add" onclick="updateCart('${d.id}', 1)">TAMBAH</button>`}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function renderQtyCtrl(id, qty) { 
            return `<div class="qty-control">
                <button class="btn-qty" onclick="updateCart('${id}', -1)">−</button>
                <span class="qty-num">${qty}</span>
                <button class="btn-qty" onclick="updateCart('${id}', 1)">+</button>
            </div>`; 
        }

        function updateCart(id, change) {
            const item = allData.find(d => d.id === id);
            if (!cart[id]) cart[id] = { name: item.name, price: item.price, qty: 0 };
            cart[id].qty += change; 
            if (cart[id].qty <= 0) delete cart[id];
            renderMenu(currentCat); 
            updateDock();
        }

        function updateDock() {
            let total = 0; for(let k in cart) total += cart[k].qty * cart[k].price;
            document.getElementById('price-total').innerText = `Rp ${total.toLocaleString('id-ID')}`;
            total > 0 ? document.getElementById('dock').classList.add('active') : document.getElementById('dock').classList.remove('active');
        }

        function selectPay(method, el) {
            selectedPayMethod = method;
            document.querySelectorAll('.pay-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        function openCheckout() {
            let html = "", total = 0;
            for(let k in cart) { 
                let sub = cart[k].qty * cart[k].price;
                html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span>${cart[k].name} <small>(x${cart[k].qty})</small></span>
                            <span>Rp ${sub.toLocaleString('id-ID')}</span>
                         </div>`;
                total += sub;
            }
            document.getElementById('order-summary').innerHTML = html + `
                <div style="border-top:1px solid #444; margin-top:10px; padding-top:10px; display:flex; justify-content:space-between; font-weight:800; color:var(--gold); font-size:16px;">
                    <span>TOTAL</span><span>Rp ${total.toLocaleString('id-ID')}</span>
                </div>`;
            document.getElementById('checkout-overlay').classList.add('active');
        }

        function closeCheckout() { document.getElementById('checkout-overlay').classList.remove('active'); }

        async function prosesPesanan() {
            const nama = document.getElementById('buyer-name').value;
            if(!nama) return alert("isi dulu nama dulu yaa!");
            if(!selectedPayMethod) return alert("Pilih mau bayar pake apa!");

            let total = 0, detailText = "";
            for(let k in cart) { 
                total += cart[k].qty * cart[k].price;
                detailText += `\n• ${cart[k].name} (x${cart[k].qty})`;
            }

            // --- 1. KIRIM NOTIFIKASI KE BOT TELEGRAM ---
            const msg = `🚀 *PESANAN BARU MASUK!*
---------------------------
👤 *Nama:* ${nama}
💳 *Bayar:* ${selectedPayMethod}
💰 *Total:* Rp ${total.toLocaleString('id-ID')}

📦 *Detail:*${detailText}
---------------------------
_Buruan dibikin, kasihan yang laper!_`;

            try {
                await fetch(`https://api.telegram.org/bot${TELE_TOKEN}/sendMessage`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELE_CHAT_ID, text: msg, parse_mode: 'Markdown' })
                });
            } catch (e) { console.error("Tele Error:", e); }

            // --- 2. LOGIKA PEMBAYARAN ---
            if(selectedPayMethod === 'QRIS') {
                document.getElementById('qr-total-label').innerText = `Rp ${total.toLocaleString('id-ID')}`;
                // API Kurniawan AD untuk Generate QRIS Dinamis
                document.getElementById('qr-image').src = `https://qris.kurniawanad.my.id/qris.php?data=${QRIS_DATA}&amount=${total}`;
                document.getElementById('qr-modal').style.display = 'flex';
            } else {
                alert("Sipp! Pesanan Tunai dicatat. Tunggu di meja ya!");
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
